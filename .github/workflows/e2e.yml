name: E2E Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'index.html'
      - 'package*.json'
      - 'vite.config.ts'
      - 'playwright.config.ts'
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [ main ]
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'index.html'
      - 'package*.json'
      - 'vite.config.ts'
      - 'playwright.config.ts'

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      ALL_BROWSERS: ${{ ((github.event_name == 'push' && github.ref == 'refs/heads/main') || contains(github.event.pull_request.labels.*.name, 'test:all-browsers')) && 'true' || '' }}

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: |
        if [ "$ALL_BROWSERS" = "true" ]; then
          npx playwright install --with-deps
        else
          npx playwright install --with-deps chromium
        fi

    - name: Run Playwright tests
      run: npm run test:e2e

