name: E2E Tests

on:
  workflow_call:
    inputs:
      base_url:
        description: 'Base URL for e2e tests (defaults to localhost dev server)'
        required: false
        type: string
        default: ''
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'index.html'
      - 'package*.json'
      - 'vite.config.ts'
      - 'playwright.config.ts'
      - '.github/workflows/**'
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main ]
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'index.html'
      - 'package*.json'
      - 'vite.config.ts'
      - 'playwright.config.ts'
      - '.github/workflows/**'

jobs:
  e2e-pr:
    name: E2E (chromium)
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_call'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: 'npm'

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-chromium-${{ hashFiles('package-lock.json') }}

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Run Playwright tests
      run: npx playwright test --project=chromium
      env:
        E2E_BASE_URL: ${{ inputs.base_url }}

  e2e-main:
    name: E2E (all browsers)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: 'npm'

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ matrix.browser }}-${{ hashFiles('package-lock.json') }}

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps ${{ matrix.browser }}

    - name: Run Playwright tests
      run: npx playwright test --project=${{ matrix.browser }}
      env:
        ALL_BROWSERS: 'true'
