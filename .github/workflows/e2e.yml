name: E2E Tests

on:
  workflow_call:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'index.html'
      - 'package*.json'
      - 'vite.config.ts'
      - 'playwright.config.ts'
      - '.github/workflows/**'
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main ]
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'index.html'
      - 'package*.json'
      - 'vite.config.ts'
      - 'playwright.config.ts'
      - '.github/workflows/**'

jobs:
  should-run:
    runs-on: ubuntu-latest
    steps:
    - run: echo "E2E workflow triggered on ${{ github.event_name }}"

  e2e-tests:
    name: E2E (chromium)
    needs: should-run
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
    - name: Run Playwright tests
      run: npx playwright test --project=chromium
